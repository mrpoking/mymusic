<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Playlist</title>

    <link rel="icon" href="../image/music.png" type="image/png">
    <link rel="stylesheet" href="css/body.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/theme.js" defer></script>
    <script src="js/function.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <button type="button" id="themeButton" class="theme-button"></button>
        </div>

        <div class="navbar-right">
            <input type="search" id="trackSearch" placeholder="..." data-search class="track-search-bar" autocomplete="off">

            <button type="button" class="upload-track-button">
                <label id="track-input-label" for="track-input" class="track-input">
                    <input type="file" id="track-input" name="track-input" multiple accept=".mp3, .mp4">

                    <div id="trackUploadButton"></div>
                </label>
                
                <audio id="audio" preload="metadata"></audio>
            </button>
        </div>
    </nav>

    <div class="sidebar">
        <div class="user-controls-layout">
            <div class="track-name-wrapper">
                <p id="trackName" class="track-name-display">Loading Previous Track..</p>
            </div>

            <div class="control-button-wrapper">
                <button type="button" id="previousButton" class="control-previous-button">«</button>

                <button type="button" id="playPauseButton" class="play-pause-button">▶︎</button>

                <button type="button" id="nextButton" class="control-next-button">»</button>
            </div>

            <input type="range" id="volumeBar" min="0" max="1" step="0.01">

            <input type="range" id="seekBar" value="0" step="0.01">
        </div>

        <div id="playList" class="user-playlist-layout"></div>
    </div>
</body>
</html>
